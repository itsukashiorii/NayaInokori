<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Naya ♡⁠_♡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        video {
            display: block;
            transition: all 0.3s ease;
            max-width: 100%;
            max-height: 100%;
        }

        /* Aspect ratio modes */
        .video-wrapper.mode-contain video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-wrapper.mode-cover video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-wrapper.mode-stretch video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        .video-wrapper.mode-original video {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Thumbnail overlay */
        .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 4;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .thumbnail-overlay.hidden {
            opacity: 0;
        }

        /* Overlay gelap saat kontrol muncul */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.4) 0%,
                rgba(0,0,0,0) 20%,
                rgba(0,0,0,0) 80%,
                rgba(0,0,0,0.5) 100%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }

        .player-container.show-controls .overlay {
            opacity: 1;
        }

        /* ===== HEADER ===== */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .player-container.show-controls .header {
            opacity: 1;
            transform: translateY(0);
        }

        .back-btn, .audio-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            outline: none;
        }

        .back-btn:hover, .audio-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .back-btn svg, .audio-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .title {
            flex: 1;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* ===== LEFT CONTROLS ===== */
        .left-controls {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-container.show-controls .left-controls {
            opacity: 1;
        }

        .ctrl-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            outline: none;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .ctrl-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .ctrl-btn.lock-active {
            background: rgba(33, 150, 243, 0.3);
        }

        /* ===== RIGHT CONTROLS ===== */
        .right-controls {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-container.show-controls .right-controls {
            opacity: 1;
        }

        .right-controls .ctrl-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Volume slider */
        .volume-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .volume-slider {
            position: absolute;
            bottom: 50px;
            width: 36px;
            height: 120px;
            background: rgba(30,30,30,0.9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(10px);
        }

        .volume-container:hover .volume-slider,
        .volume-container.active .volume-slider {
            opacity: 1;
            pointer-events: all;
        }

        .volume-track {
            width: 4px;
            height: 90px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2196F3;
            border-radius: 2px;
            height: 70%;
        }

        .volume-thumb {
            position: absolute;
            bottom: 70%;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* ===== BOTTOM CONTROLS ===== */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 16px 20px;
            z-index: 10;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .player-container.show-controls .bottom-controls {
            opacity: 1;
            transform: translateY(0);
        }

        /* Progress bar */
        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .time {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            min-width: 40px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .time.current {
            text-align: left;
        }

        .time.duration {
            text-align: right;
        }

        .progress-container {
            flex: 1;
            height: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            position: relative;
            overflow: visible;
            transition: height 0.2s;
        }

        .progress-container:hover .progress-track {
            height: 4px;
        }

        .progress-fill {
            height: 100%;
            background: #2196F3;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }

        .progress-thumb {
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
        }

        .progress-container:hover .progress-thumb,
        .progress-container.dragging .progress-thumb {
            opacity: 1;
        }

        .progress-thumb::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #2196F3;
            border-radius: 50%;
        }

        /* Tooltip waktu saat hover */
        .time-tooltip {
            position: absolute;
            top: -30px;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .progress-container:hover .time-tooltip {
            opacity: 1;
        }

        /* Bottom buttons row */
        .bottom-buttons {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .center-buttons {
            display: flex;
            align-items: center;
            gap: 32px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .bottom-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .bottom-btn:active {
            transform: scale(0.9);
        }

        .bottom-btn svg {
            fill: #fff;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }

        .bottom-btn.play-pause svg {
            width: 32px;
            height: 32px;
        }

        .bottom-btn.nav-btn svg {
            width: 28px;
            height: 28px;
        }

        .bottom-btn.side-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Center play button (muncul saat pause) */
        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 6;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .center-play.visible {
            opacity: 1;
            pointer-events: all;
        }

        .center-play svg {
            width: 30px;
            height: 30px;
            fill: #fff;
            margin-left: 4px;
        }

        /* Loading spinner */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 7;
            display: none;
        }

        .loader.show {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Toast notification */
        .toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Lock mode */
        .player-container.locked .header,
        .player-container.locked .left-controls,
        .player-container.locked .right-controls,
        .player-container.locked .bottom-controls {
            display: none !important;
        }

        .player-container.locked .overlay {
            opacity: 0 !important;
        }

        .unlock-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 16px 28px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .player-container.locked.show-unlock .unlock-hint {
            opacity: 1;
        }

        /* Double tap seek indicators */
        .seek-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 8;
            backdrop-filter: blur(5px);
        }

        .seek-indicator.show {
            opacity: 1;
        }

        .seek-indicator.left {
            left: 40px;
        }

        .seek-indicator.right {
            right: 40px;
        }

        .seek-indicator svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            margin-bottom: 4px;
        }

        .seek-indicator span {
            font-size: 14px;
            font-weight: 600;
        }

        /* Video counter badge */
        .video-counter {
            position: absolute;
            top: 60px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
        }

        .player-container.show-controls .video-counter {
            opacity: 1;
        }

        /* Aspect ratio indicator */
        .ratio-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .ratio-indicator.show {
            opacity: 1;
        }

        /* Swipe transition */
        .video-wrapper {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .video-wrapper.swipe-left {
            transform: translateX(-30px);
            opacity: 0;
        }

        .video-wrapper.swipe-right {
            transform: translateX(30px);
            opacity: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .center-buttons {
                gap: 24px;
            }
            .right-controls {
                right: 10px;
                gap: 10px;
            }
            .left-controls {
                left: 10px;
                gap: 12px;
            }
            .ctrl-btn {
                width: 38px;
                height: 38px;
            }
            .ctrl-btn svg {
                width: 18px;
                height: 18px;
            }
        }

        /* Gesture areas */
        .gesture-left, .gesture-right {
            position: absolute;
            top: 60px;
            bottom: 100px;
            width: 35%;
            z-index: 3;
        }

        .gesture-left {
            left: 0;
        }

        .gesture-right {
            right: 0;
        }
    </style>

<body>

<div class="player-container show-controls" id="playerContainer">
    <div class="video-wrapper mode-contain" id="videoWrapper">
        <video id="video" preload="metadata" playsinline></video>
        <div class="thumbnail-overlay" id="thumbnailOverlay"></div>
    </div>

    <div class="overlay"></div>
    <div class="loader" id="loader"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Ratio indicator -->
    <div class="ratio-indicator" id="ratioIndicator">Fit to Screen</div>

    <!-- Video counter -->
    <div class="video-counter" id="videoCounter">1 / 3</div>

    <!-- Unlock hint -->
    <div class="unlock-hint">Ketuk 2x untuk membuka kunci</div>

    <!-- Seek Indicators -->
    <div class="seek-indicator left" id="seekLeft">
        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
        <span>-10s</span>
    </div>
    <div class="seek-indicator right" id="seekRight">
        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        <span>+10s</span>
    </div>

    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="goBack()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div class="title" id="videoTitle">Video 1</div>
        <button class="audio-btn" onclick="toggleAudioTrack()">
            <svg viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
        </button>
    </div>

    <!-- Left Controls -->
    <div class="left-controls">
        <button class="ctrl-btn" id="lockBtn" onclick="toggleLock()">
            <svg viewBox="0 0 24 24" id="lockIcon">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
        </button>
        <button class="ctrl-btn" onclick="takeScreenshot()">
            <svg viewBox="0 0 24 24"><path d="M9.4 10.5l4.77-8.26C13.47 2.09 12.75 2 12 2c-2.4 0-4.6.85-6.32 2.25l3.66 6.35.06-.1zM21.54 9c-.92-2.92-3.15-5.26-6-6.34L11.88 9h9.66zm.27 3h-7.49l.29.5 4.17 7.23c.93-1.33 1.48-2.95 1.48-4.71 0-.82-.1-1.62-.29-2.38-.11-.47-.22-.94-.35-1.4l-.81.76zm-7.73-3l-2.55-4.42A9.992 9.992 0 002 12c0 2.76 1.12 5.26 2.93 7.07l4.16-7.22.02-.04zm8.57 11.54l-6.9-11.96c-.37-.66-1.04-1.07-1.78-1.07s-1.41.41-1.78 1.07l-6.9 11.96c-.37.66-.36 1.47.03 2.12.39.65 1.1 1.05 1.87 1.05h13.73c.77 0 1.48-.4 1.87-1.05.39-.65.4-1.46.03-2.12z"/></svg>
        </button>
    </div>

    <!-- Right Controls -->
    <div class="right-controls">
        <button class="ctrl-btn" onclick="showPlaylist()">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>

        <div class="volume-container" id="volumeContainer">
            <button class="ctrl-btn" onclick="toggleMute()" id="muteBtn">
                <svg viewBox="0 0 24 24" id="volumeIcon">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>
            <div class="volume-slider">
                <div class="volume-track" id="volumeTrack">
                    <div class="volume-fill" id="volumeFill" style="height: 70%"></div>
                    <div class="volume-thumb" id="volumeThumb" style="bottom: 70%"></div>
                </div>
            </div>
        </div>

        <button class="ctrl-btn" onclick="toggleCrop()" id="cropBtn">
            <svg viewBox="0 0 24 24"><path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z"/></svg>
        </button>

        <button class="ctrl-btn" onclick="toggleSubtitle()">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        </button>

        <button class="ctrl-btn" onclick="shareVideo()">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
        </button>

        <button class="ctrl-btn" onclick="showMore()">
            <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>

        <button class="ctrl-btn" onclick="togglePiP()">
            <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
        </button>
    </div>

    <!-- Center Play Button -->
    <div class="center-play visible" id="centerPlay" onclick="togglePlay()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <!-- Gesture Areas -->
    <div class="gesture-left" id="gestureLeft"></div>
    <div class="gesture-right" id="gestureRight"></div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
        <div class="progress-area">
            <span class="time current" id="currentTime">00:00</span>
            <div class="progress-container" id="progressContainer">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
                <div class="time-tooltip" id="timeTooltip">00:00</div>
            </div>
            <span class="time duration" id="duration">00:00</span>
        </div>

        <div class="bottom-buttons">
            <button class="bottom-btn side-btn" id="loopBtn" onclick="toggleLoop()">
                <svg viewBox="0 0 24 24" id="loopIcon">
                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
            </button>

            <div class="center-buttons">
                <button class="bottom-btn nav-btn" onclick="prevVideo()">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="bottom-btn play-pause" id="playPauseBtn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" id="playIcon">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button class="bottom-btn nav-btn" onclick="nextVideo()">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <button class="bottom-btn side-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
                <svg viewBox="0 0 24 24" id="fullscreenIcon">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // ===== DATA VIDEO =====
    const videos = [
        {
            src: "https://ik.imagekit.io/oyaznyo3sc/snapsave-app_1557731668970636_hd.mp4",
            title: "Video 1",
            thumbnail: "15.jpg"
        },
        {
            src: "https://ik.imagekit.io/oyaznyo3sc/Proyek%20Baru%20_6440CAB_.mp4",
            title: "kece banget jir my bini gyweh semua kecuali yuuji taoi dia ganteng gg kece jirrr:b",
            thumbnail: "15.jpg"
        },
        {
            src: "video3.mp4",
            title: "Video 3",
            thumbnail: "15.jpg"
        }
    ];

    let currentVideoIndex = 0;

    // ===== DOM ELEMENTS =====
    const video = document.getElementById('video');
    const container = document.getElementById('playerContainer');
    const videoWrapper = document.getElementById('videoWrapper');
    const thumbnailOverlay = document.getElementById('thumbnailOverlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const centerPlay = document.getElementById('centerPlay');
    const progressFill = document.getElementById('progressFill');
    const progressContainer = document.getElementById('progressContainer');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const timeTooltip = document.getElementById('timeTooltip');
    const loader = document.getElementById('loader');
    const toast = document.getElementById('toast');
    const loopBtn = document.getElementById('loopBtn');
    const loopIcon = document.getElementById('loopIcon');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fullscreenIcon = document.getElementById('fullscreenIcon');
    const lockBtn = document.getElementById('lockBtn');
    const lockIcon = document.getElementById('lockIcon');
    const volumeFill = document.getElementById('volumeFill');
    const volumeThumb = document.getElementById('volumeThumb');
    const volumeTrack = document.getElementById('volumeTrack');
    const volumeIcon = document.getElementById('volumeIcon');
    const seekLeft = document.getElementById('seekLeft');
    const seekRight = document.getElementById('seekRight');
    const videoTitle = document.getElementById('videoTitle');
    const videoCounter = document.getElementById('videoCounter');
    const ratioIndicator = document.getElementById('ratioIndicator');

    let isPlaying = false;
    let isLocked = false;
    let isLooping = false;
    let isDragging = false;
    let controlsTimeout;
    let lastTap = 0;
    let tapTimeout;
    let currentRatioMode = 0;

    const ratioModes = [
        { name: 'mode-contain', label: 'Fit to Screen' },
        { name: 'mode-cover', label: 'Fill Screen' },
        { name: 'mode-stretch', label: 'Stretch' },
        { name: 'mode-original', label: 'Original' }
    ];

    // ===== LOAD VIDEO =====
    function loadVideo(index) {
        currentVideoIndex = index;
        const data = videos[index];
        video.src = data.src;
        videoTitle.textContent = data.title;
        videoCounter.textContent = (index + 1) + ' / ' + videos.length;
        thumbnailOverlay.style.backgroundImage = `url('${data.thumbnail}')`;
        thumbnailOverlay.classList.remove('hidden');
        video.load();
        isPlaying = false;
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        centerPlay.classList.add('visible');
        progressFill.style.width = '0%';
        currentTimeEl.textContent = '00:00';
        durationEl.textContent = '00:00';
    }

    // ===== FORMAT WAKTU =====
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // ===== SHOW TOAST =====
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ===== SHOW RATIO INDICATOR =====
    function showRatioIndicator(label) {
        ratioIndicator.textContent = label;
        ratioIndicator.classList.add('show');
        setTimeout(() => ratioIndicator.classList.remove('show'), 1500);
    }

    // ===== TOGGLE PLAY/PAUSE =====
    function togglePlay() {
        if (video.paused) {
            video.play();
            isPlaying = true;
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            centerPlay.classList.remove('visible');
            thumbnailOverlay.classList.add('hidden');
        } else {
            video.pause();
            isPlaying = false;
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            centerPlay.classList.add('visible');
            thumbnailOverlay.classList.remove('hidden');
        }
        resetControlsTimeout();
    }

    // ===== UPDATE PROGRESS =====
    function updateProgress() {
        if (!isDragging && video.duration) {
            const pct = (video.currentTime / video.duration) * 100;
            progressFill.style.width = pct + '%';
            currentTimeEl.textContent = formatTime(video.currentTime);
        }
    }

    video.addEventListener('timeupdate', updateProgress);

    video.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatTime(video.duration);
    });

    video.addEventListener('waiting', () => loader.classList.add('show'));
    video.addEventListener('playing', () => loader.classList.remove('show'));
    video.addEventListener('canplay', () => loader.classList.remove('show'));

    video.addEventListener('ended', () => {
        isPlaying = false;
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        centerPlay.classList.add('visible');
        thumbnailOverlay.classList.remove('hidden');
        if (isLooping) {
            video.play();
            isPlaying = true;
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            centerPlay.classList.remove('visible');
            thumbnailOverlay.classList.add('hidden');
        }
    });

    // Saat video pause, tampilkan thumbnail
    video.addEventListener('pause', () => {
        thumbnailOverlay.classList.remove('hidden');
    });

    // Saat video play, sembunyikan thumbnail
    video.addEventListener('play', () => {
        thumbnailOverlay.classList.add('hidden');
    });

    // ===== PROGRESS BAR INTERACTION =====
    progressContainer.addEventListener('click', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        video.currentTime = pct * video.duration;
    });

    progressContainer.addEventListener('mousemove', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        timeTooltip.style.left = (pct * 100) + '%';
        if (video.duration) {
            timeTooltip.textContent = formatTime(pct * video.duration);
        }
    });

    // Drag progress
    let dragStart = false;
    progressContainer.addEventListener('mousedown', (e) => {
        dragStart = true;
        isDragging = true;
        progressContainer.classList.add('dragging');
        seek(e);
    });

    document.addEventListener('mousemove', (e) => {
        if (dragStart) {
            seek(e);
        }
    });

    document.addEventListener('mouseup', () => {
        if (dragStart) {
            dragStart = false;
            isDragging = false;
            progressContainer.classList.remove('dragging');
        }
    });

    function seek(e) {
        const rect = progressContainer.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        progressFill.style.width = (pct * 100) + '%';
        if (video.duration) {
            video.currentTime = pct * video.duration;
            currentTimeEl.textContent = formatTime(video.currentTime);
        }
    }

    // ===== VOLUME =====
    function setVolume(pct) {
        video.volume = pct;
        volumeFill.style.height = (pct * 100) + '%';
        volumeThumb.style.bottom = (pct * 100) + '%';
        updateVolumeIcon();
    }

    function updateVolumeIcon() {
        const v = video.volume;
        const muted = video.muted;
        if (muted || v === 0) {
            volumeIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
        } else if (v < 0.5) {
            volumeIcon.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>';
        } else {
            volumeIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
        }
    }

    function toggleMute() {
        video.muted = !video.muted;
        updateVolumeIcon();
        showToast(video.muted ? 'Muted' : 'Unmuted');
    }

    // Volume drag
    let volDrag = false;
    volumeTrack.addEventListener('mousedown', (e) => {
        volDrag = true;
        setVolFromEvent(e);
    });

    document.addEventListener('mousemove', (e) => {
        if (volDrag) setVolFromEvent(e);
    });

    document.addEventListener('mouseup', () => {
        volDrag = false;
    });

    function setVolFromEvent(e) {
        const rect = volumeTrack.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
        setVolume(pct);
    }

    // Touch support for volume
    volumeTrack.addEventListener('touchstart', (e) => {
        volDrag = true;
        setVolFromTouch(e);
    }, {passive: false});

    document.addEventListener('touchmove', (e) => {
        if (volDrag) {
            e.preventDefault();
            setVolFromTouch(e);
        }
    }, {passive: false});

    document.addEventListener('touchend', () => {
        volDrag = false;
    });

    function setVolFromTouch(e) {
        const rect = volumeTrack.getBoundingClientRect();
        const touch = e.touches[0];
        const pct = Math.max(0, Math.min(1, 1 - (touch.clientY - rect.top) / rect.height));
        setVolume(pct);
    }

    // ===== CONTROLS VISIBILITY =====
    function showControls() {
        container.classList.add('show-controls');
        resetControlsTimeout();
    }

    function hideControls() {
        if (isPlaying && !isLocked) {
            container.classList.remove('show-controls');
        }
    }

    function resetControlsTimeout() {
        clearTimeout(controlsTimeout);
        if (isPlaying && !isLocked) {
            controlsTimeout = setTimeout(hideControls, 3000);
        }
    }

    container.addEventListener('mousemove', showControls);
    container.addEventListener('click', (e) => {
        if (e.target.closest('.ctrl-btn') || e.target.closest('.bottom-btn') || e.target.closest('.back-btn') || e.target.closest('.audio-btn') || e.target.closest('.progress-container') || e.target.closest('.volume-track')) {
            return;
        }
        if (isLocked) {
            container.classList.add('show-unlock');
            setTimeout(() => container.classList.remove('show-unlock'), 1500);
            return;
        }
        showControls();
    });

    container.addEventListener('touchstart', () => {
        if (!isLocked) showControls();
    });

    // ===== LOCK =====
    function toggleLock() {
        isLocked = !isLocked;
        if (isLocked) {
            container.classList.add('locked');
            container.classList.remove('show-controls');
            lockBtn.classList.add('lock-active');
            lockIcon.innerHTML = '<path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h1.9c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10z"/>';
            showToast('Layar terkunci');
        } else {
            container.classList.remove('locked');
            container.classList.add('show-controls');
            lockBtn.classList.remove('lock-active');
            lockIcon.innerHTML = '<path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>';
            showToast('Layar dibuka');
            resetControlsTimeout();
        }
    }

    // Double tap to unlock
    container.addEventListener('dblclick', (e) => {
        if (isLocked) {
            toggleLock();
        }
    });

    // Double tap seek
    document.getElementById('gestureLeft').addEventListener('dblclick', (e) => {
        e.stopPropagation();
        if (!isLocked) {
            video.currentTime = Math.max(0, video.currentTime - 10);
            showSeekIndicator('left');
            showToast('-10 detik');
        }
    });

    document.getElementById('gestureRight').addEventListener('dblclick', (e) => {
        e.stopPropagation();
        if (!isLocked) {
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
            showSeekIndicator('right');
            showToast('+10 detik');
        }
    });

    function showSeekIndicator(side) {
        const el = side === 'left' ? seekLeft : seekRight;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 600);
    }

    // ===== LOOP =====
    function toggleLoop() {
        isLooping = !isLooping;
        video.loop = isLooping;
        if (isLooping) {
            loopBtn.style.opacity = '1';
            loopIcon.style.fill = '#2196F3';
            showToast('Loop aktif');
        } else {
            loopBtn.style.opacity = '0.8';
            loopIcon.style.fill = '#fff';
            showToast('Loop nonaktif');
        }
    }

    // ===== FULLSCREEN =====
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(() => {});
            fullscreenIcon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
        } else {
            document.exitFullscreen();
            fullscreenIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            fullscreenIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
    });

    // ===== SCREENSHOT =====
    function takeScreenshot() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const link = document.createElement('a');
        link.download = 'screenshot_' + Date.now() + '.png';
        link.href = canvas.toDataURL();
        link.click();
        showToast('Screenshot disimpan');
    }

    // ===== ASPECT RATIO / CROP =====
    function toggleCrop() {
        // Hapus semua mode
        ratioModes.forEach(m => videoWrapper.classList.remove(m.name));
        // Pindah ke mode berikutnya
        currentRatioMode = (currentRatioMode + 1) % ratioModes.length;
        const mode = ratioModes[currentRatioMode];
        videoWrapper.classList.add(mode.name);
        showRatioIndicator(mode.label);
        showToast(mode.label);
    }

    // ===== NAVIGASI VIDEO =====
    function prevVideo() {
        if (currentVideoIndex > 0) {
            videoWrapper.classList.add('swipe-right');
            setTimeout(() => {
                loadVideo(currentVideoIndex - 1);
                videoWrapper.classList.remove('swipe-right');
            }, 300);
        } else {
            showToast('Ini video pertama');
        }
    }

    function nextVideo() {
        if (currentVideoIndex < videos.length - 1) {
            videoWrapper.classList.add('swipe-left');
            setTimeout(() => {
                loadVideo(currentVideoIndex + 1);
                videoWrapper.classList.remove('swipe-left');
            }, 300);
        } else {
            showToast('Ini video terakhir');
        }
    }

    // ===== SWIPE GESTURE UNTUK GANTI VIDEO =====
    let touchStartX = 0;
    let touchStartY = 0;
    let isSwiping = false;

    container.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isSwiping = true;
    }, {passive: true});

    container.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const diffX = touchStartX - touchX;
        const diffY = touchStartY - touchY;

        // Hanya swipe horizontal yang jauh lebih besar dari vertical
        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
            e.preventDefault();
        }
    }, {passive: false});

    container.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchStartX - touchEndX;
        const diffY = touchStartY - touchEndY;

        // Swipe horizontal dengan threshold
        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 80) {
            if (diffX > 0) {
                // Swipe kiri -> next video
                nextVideo();
            } else {
                // Swipe kanan -> prev video
                prevVideo();
            }
        }
    }, {passive: true});

    // ===== DISABLE RIGHT CLICK =====
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showToast('Download dinonaktifkan');
        return false;
    });

    // Disable right click on video specifically
    video.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Disable drag on video
    video.addEventListener('dragstart', (e) => {
        e.preventDefault();
        return false;
    });

    // ===== PLACEHOLDER FUNCTIONS =====
    function goBack() { showToast('Kembali'); }
    function toggleAudioTrack() { showToast('Audio track'); }
    function showPlaylist() { showToast('Playlist'); }
    function toggleSubtitle() { showToast('Subtitle'); }
    function shareVideo() {
        if (navigator.share) {
            navigator.share({ title: videoTitle.textContent, url: window.location.href });
        } else {
            showToast('Share');
        }
    }
    function showMore() { showToast('More options'); }
    async function togglePiP() {
        try {
            if (document.pictureInPictureElement) {
                await document.exitPictureInPicture();
            } else {
                await video.requestPictureInPicture();
            }
        } catch {
            showToast('PiP tidak didukung');
        }
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        switch(e.key) {
            case ' ': e.preventDefault(); togglePlay(); break;
            case 'ArrowLeft': video.currentTime -= 5; break;
            case 'ArrowRight': video.currentTime += 5; break;
            case 'ArrowUp': video.volume = Math.min(1, video.volume + 0.1); setVolume(video.volume); break;
            case 'ArrowDown': video.volume = Math.max(0, video.volume - 0.1); setVolume(video.volume); break;
            case 'f': toggleFullscreen(); break;
            case 'm': toggleMute(); break;
            case 'l': toggleLoop(); break;
        }
    });

    // ===== INIT =====
    setVolume(0.7);
    loadVideo(0);
</script>
